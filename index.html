<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrToSb — Браузер на Supabase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            user-select: none;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
        }
        .browser-frame {
            background: #1e1e2e;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .tab {
            transition: all 0.2s;
            cursor: pointer;
            background: #2a2a3e;
            color: #aaa;
        }
        .tab.active {
            background: #3a3a5e;
            color: white;
            border-bottom: 2px solid #ff6b6b;
        }
        .tab:hover:not(.active) {
            background: #353550;
            color: #ddd;
        }
        .url-bar {
            background: #2a2a3e;
            border: 1px solid #3a3a5e;
            transition: all 0.2s;
        }
        .url-bar:focus-within {
            border-color: #ff6b6b;
            box-shadow: 0 0 0 2px rgba(255,107,107,0.2);
        }
        .url-bar input {
            background: transparent;
            color: white;
        }
        .url-bar input::placeholder {
            color: #666;
        }
        .nav-btn {
            background: #2a2a3e;
            transition: all 0.2s;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
        }
        .nav-btn:hover {
            background: #3a3a5e;
            transform: scale(1.05);
        }
        .nav-btn:active {
            transform: scale(0.95);
        }
        .go-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            transition: all 0.2s;
            cursor: pointer;
        }
        .go-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }
        #browser-iframe {
            background: white;
            width: 100%;
            height: 550px;
            border: none;
        }
        .search-card {
            background: white;
            border-radius: 12px;
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid #e0e0e0;
        }
        .search-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            border-color: #ff6b6b;
        }
        .loader {
            width: 48px;
            height: 48px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #ff6b6b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1e2e;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff6b6b;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ee5a24;
        }
    </style>
</head>
<body class="p-4">

<div class="max-w-6xl mx-auto">
    <!-- ШАПКА -->
    <div class="flex justify-between items-center mb-4">
        <div class="flex items-center gap-3">
            <img src="https://img.icons8.com/fluency/48/traffic-light.png" class="w-10 h-10" alt="logo">
            <span class="text-2xl font-bold text-white">BrToSb</span>
            <span class="text-xs bg-white/20 px-2 py-1 rounded-full text-white/80">Supabase Browser</span>
        </div>
        <button id="authBtn" class="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-xl transition flex items-center gap-2">
            <img src="https://img.icons8.com/ios-glyphs/30/ffffff/user--v1.png" class="w-5 h-5" alt="user">
            <span>Войти</span>
        </button>
    </div>

    <!-- БРАУЗЕР -->
    <div class="browser-frame">
        <!-- ВКЛАДКИ -->
        <div class="flex items-center gap-1 px-3 pt-3 overflow-x-auto" id="tabsContainer">
        </div>

        <!-- ПАНЕЛЬ НАВИГАЦИИ -->
        <div class="p-3 border-t border-[#2a2a3e]">
            <div class="flex gap-2 items-center">
                <div class="nav-btn" id="backBtn">
                    <img src="https://img.icons8.com/ios-glyphs/30/ffffff/chevron-left.png" class="w-5 h-5" alt="back">
                </div>
                <div class="nav-btn" id="forwardBtn">
                    <img src="https://img.icons8.com/ios-glyphs/30/ffffff/chevron-right.png" class="w-5 h-5" alt="forward">
                </div>
                <div class="nav-btn" id="reloadBtn">
                    <img src="https://img.icons8.com/ios-glyphs/30/ffffff/refresh.png" class="w-5 h-5" alt="reload">
                </div>
                <div class="nav-btn" id="homeBtn">
                    <img src="https://img.icons8.com/ios-glyphs/30/ffffff/home.png" class="w-5 h-5" alt="home">
                </div>
                <div class="flex-1 url-bar rounded-xl px-3 py-2">
                    <input type="text" id="urlInput" placeholder="Введите URL или поисковый запрос..." class="w-full outline-none text-sm">
                </div>
                <div class="go-btn px-6 py-2 rounded-xl text-white font-semibold text-center" id="goBtn">
                    Перейти
                </div>
                <div class="nav-btn" id="bookmarkBtn">
                    <img src="https://img.icons8.com/ios-glyphs/30/ffffff/bookmark-ribbon.png" class="w-5 h-5" alt="bookmark">
                </div>
            </div>
        </div>

        <!-- ОБЛАСТЬ КОНТЕНТА - ТЕПЕРЬ IFRAME -->
        <div id="contentArea" class="relative bg-white" style="min-height: 550px">
            <iframe id="browser-iframe" src="about:blank" style="width: 100%; height: 550px; border: none; background: white;"></iframe>
            <div id="searchResults" class="hidden p-6 overflow-y-auto bg-white" style="max-height: 550px"></div>
            <div id="loadingOverlay" class="hidden absolute inset-0 bg-black/80 flex items-center justify-center z-50">
                <div class="text-center">
                    <div class="loader mx-auto mb-4"></div>
                    <p class="text-white">Загрузка через Supabase...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- СТАТУС БАР -->
    <div class="mt-4 text-center text-white/60 text-sm flex justify-between items-center">
        <span class="flex items-center gap-2">
            <img src="https://img.icons8.com/ios-glyphs/30/ffffff/database.png" class="w-4 h-4" alt="db">
            Supabase Storage
        </span>
        <span class="flex items-center gap-2" id="statusBar">
            <img src="https://img.icons8.com/ios-glyphs/30/ffffff/checkmark--v1.png" class="w-4 h-4" alt="ready">
            Готов к работе
        </span>
    </div>
</div>

<script>
    // ============= НАСТРОЙКИ SUPABASE =============
    const SUPABASE_URL = 'https://runvaexsmgbdeboauaap.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1bnZhZXhzbWdiZGVib2F1YWFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzM1MzcsImV4cCI6MjA5MDYwOTUzN30.y5AL4XkUPzDl1jGDLfvKistXflOpuxcSoedzbhr6hgk';
    
    let supabaseClient;
    if (window._supabaseClient) {
        supabaseClient = window._supabaseClient;
    } else {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        window._supabaseClient = supabaseClient;
    }
    
    // ============= ГЛОБАЛЬНОЕ СОСТОЯНИЕ =============
    let currentUser = null;
    let tabs = [];
    let activeTabId = null;
    let tabCounter = 0;
    
    // ============= DOM ЭЛЕМЕНТЫ =============
    const iframe = document.getElementById('browser-iframe');
    const urlInput = document.getElementById('urlInput');
    const searchResultsDiv = document.getElementById('searchResults');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const statusBar = document.getElementById('statusBar');
    const tabsContainer = document.getElementById('tabsContainer');
    
    // ============= ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =============
    function updateStatus(text, isError = false) {
        if (statusBar) {
            statusBar.innerHTML = `
                <img src="https://img.icons8.com/ios-glyphs/30/${isError ? 'ff6b6b' : 'ffffff'}/checkmark--v1.png" class="w-4 h-4" alt="status">
                ${text}
            `;
        }
    }
    
    function showSearchResults(results, query) {
        if (!searchResultsDiv) return;
        iframe.classList.add('hidden');
        searchResultsDiv.classList.remove('hidden');
        
        if (!results || results.length === 0) {
            searchResultsDiv.innerHTML = `
                <div class="text-center py-12">
                    <img src="https://img.icons8.com/clouds/100/000000/search--v1.png" class="w-24 mx-auto mb-4" alt="search">
                    <h3 class="text-xl font-bold text-gray-800 mb-2">Ничего не найдено</h3>
                    <p class="text-gray-500">Попробуйте другой поисковый запрос</p>
                </div>
            `;
            return;
        }
        
        searchResultsDiv.innerHTML = `
            <div class="mb-4 p-3 bg-gradient-to-r from-red-50 to-pink-50 rounded-xl flex items-center gap-2">
                <img src="https://img.icons8.com/ios-glyphs/30/ff6b6b/search--v1.png" class="w-5 h-5" alt="search">
                <span class="font-semibold text-gray-800">Результаты поиска: "${escapeHtml(query)}"</span>
                <span class="text-sm text-gray-500">(найдено ${results.length})</span>
            </div>
            ${results.map(r => `
                <div onclick="window.navigateToUrl('${r.url}')" class="search-card p-4 mb-3 cursor-pointer">
                    <div class="flex items-start gap-3">
                        <img src="https://www.google.com/s2/favicons?domain=${r.url}" class="w-6 h-6 mt-1" alt="icon">
                        <div class="flex-1">
                            <div class="font-bold text-indigo-600">${escapeHtml(r.title || r.url)}</div>
                            <div class="text-sm text-gray-500 mt-1">${escapeHtml(r.url)}</div>
                            <div class="text-sm text-gray-600 mt-1">${escapeHtml(r.description || 'Нет описания')}</div>
                        </div>
                    </div>
                </div>
            `).join('')}
        `;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ============= ОСНОВНЫЕ ФУНКЦИИ БРАУЗЕРА =============
    async function callEdgeFunction(action, data) {
        try {
            const { data: result, error } = await supabaseClient.functions.invoke('fetch-page', {
                body: JSON.stringify({
                    action: action,
                    ...data,
                    userId: currentUser?.id || 'anonymous'
                })
            });
            if (error) throw error;
            return result;
        } catch (err) {
            console.error('Edge Function error:', err);
            updateStatus(err.message, true);
            return { success: false, error: err.message };
        }
    }
    
    async function loadPage(url, tabId) {
        const tab = tabs.find(t => t.id === tabId);
        if (!tab) return;
        
        loadingOverlay.classList.remove('hidden');
        searchResultsDiv.classList.add('hidden');
        iframe.classList.remove('hidden');
        updateStatus('Загрузка...');
        
        try {
            const result = await callEdgeFunction('navigate', { url: url });
            
            if (result.success) {
                // Загружаем HTML в iframe с полной поддержкой CSS/JS
                iframe.srcdoc = result.html;
                
                if (tab.historyIndex < tab.history.length - 1) {
                    tab.history = tab.history.slice(0, tab.historyIndex + 1);
                }
                tab.history.push(result.url || url);
                tab.historyIndex = tab.history.length - 1;
                tab.url = result.url || url;
                
                if (urlInput) urlInput.value = result.url || url;
                updateStatus(`Загружено: ${result.title}`);
            } else if (result.searchResults) {
                showSearchResults(result.searchResults, url);
                updateStatus(`Сайт не найден, показаны результаты поиска`);
            } else {
                throw new Error(result.error || 'Неизвестная ошибка');
            }
        } catch (err) {
            iframe.srcdoc = `<html><body style="font-family: Arial; padding: 20px;"><h1 style="color: red;">⚠️ Ошибка</h1><p>${err.message}</p></body></html>`;
            updateStatus(`Ошибка: ${err.message}`, true);
        } finally {
            loadingOverlay.classList.add('hidden');
        }
    }
    
    window.navigateToUrl = function(url) {
        if (searchResultsDiv) searchResultsDiv.classList.add('hidden');
        if (iframe) iframe.classList.remove('hidden');
        const tab = tabs.find(t => t.id === activeTabId);
        if (tab) loadPage(url, activeTabId);
    };
    
    // ============= УПРАВЛЕНИЕ ВКЛАДКАМИ =============
    function createNewTab(url = 'https://google.com') {
        const newId = ++tabCounter;
        const newTab = {
            id: newId,
            url: url,
            history: [],
            historyIndex: -1
        };
        tabs.push(newTab);
        renderTabs();
        switchToTab(newId);
        loadPage(url, newId);
        return newId;
    }
    
    function switchToTab(tabId) {
        activeTabId = tabId;
        const tab = tabs.find(t => t.id === tabId);
        if (tab && urlInput) {
            urlInput.value = tab.url;
            renderTabs();
            loadPage(tab.url, tabId);
        }
    }
    
    function closeTab(tabId) {
        if (tabs.length === 1) return;
        const index = tabs.findIndex(t => t.id === tabId);
        if (index !== -1) {
            tabs.splice(index, 1);
            if (activeTabId === tabId) {
                const newActive = tabs[Math.min(index, tabs.length - 1)];
                if (newActive) switchToTab(newActive.id);
            }
            renderTabs();
        }
    }
    
    function renderTabs() {
        if (!tabsContainer) return;
        tabsContainer.innerHTML = '';
        tabs.forEach(tab => {
            const tabDiv = document.createElement('div');
            tabDiv.className = `tab px-4 py-2 rounded-t-lg text-sm font-medium flex items-center gap-2 ${activeTabId === tab.id ? 'active' : ''}`;
            tabDiv.innerHTML = `
                <img src="https://img.icons8.com/ios-glyphs/30/${activeTabId === tab.id ? 'ffffff' : 'aaaaaa'}/globe--v1.png" class="w-4 h-4" alt="tab">
                <span>${new URL(tab.url).hostname || 'Новая'}</span>
                <img src="https://img.icons8.com/ios-glyphs/30/${activeTabId === tab.id ? 'ffffff' : 'aaaaaa'}/delete-sign--v1.png" class="w-3 h-3 close-tab cursor-pointer hover:opacity-70" alt="close">
            `;
            tabDiv.onclick = (e) => {
                if (e.target.classList.contains('close-tab')) {
                    e.stopPropagation();
                    closeTab(tab.id);
                } else {
                    switchToTab(tab.id);
                }
            };
            tabsContainer.appendChild(tabDiv);
        });
        
        const newTabBtn = document.createElement('div');
        newTabBtn.className = 'tab px-3 py-2 rounded-t-lg text-sm flex items-center gap-1';
        newTabBtn.innerHTML = `
            <img src="https://img.icons8.com/ios-glyphs/30/aaaaaa/plus-math.png" class="w-4 h-4" alt="new">
            <span>Новая</span>
        `;
        newTabBtn.onclick = () => createNewTab();
        tabsContainer.appendChild(newTabBtn);
    }
    
    // ============= АВТОРИЗАЦИЯ =============
    const authBtn = document.getElementById('authBtn');
    if (authBtn) {
        authBtn.onclick = async () => {
            if (currentUser) {
                await supabaseClient.auth.signOut();
                currentUser = null;
                authBtn.innerHTML = `<img src="https://img.icons8.com/ios-glyphs/30/ffffff/user--v1.png" class="w-5 h-5" alt="user"><span>Войти</span>`;
                updateStatus('Вы вышли из аккаунта');
            } else {
                const { error } = await supabaseClient.auth.signInWithOAuth({ provider: 'github' });
                if (error) alert('Ошибка: ' + error.message);
            }
        };
    }
    
    supabaseClient.auth.onAuthStateChange((event, session) => {
        if (session) {
            currentUser = session.user;
            const userName = session.user.email.split('@')[0];
            if (authBtn) {
                authBtn.innerHTML = `<img src="https://img.icons8.com/ios-glyphs/30/ffffff/user--v1.png" class="w-5 h-5" alt="user"><span>${userName}</span>`;
            }
            updateStatus(`Авторизован как ${session.user.email}`);
        }
    });
    
    // ============= НАВИГАЦИЯ =============
    const goBtn = document.getElementById('goBtn');
    if (goBtn) {
        goBtn.onclick = () => {
            let input = urlInput ? urlInput.value.trim() : '';
            if (input) loadPage(input, activeTabId);
        };
    }
    
    if (urlInput) {
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && goBtn) goBtn.click();
        });
    }
    
    const reloadBtn = document.getElementById('reloadBtn');
    if (reloadBtn) {
        reloadBtn.onclick = () => {
            const tab = tabs.find(t => t.id === activeTabId);
            if (tab) loadPage(tab.url, activeTabId);
        };
    }
    
    const homeBtn = document.getElementById('homeBtn');
    if (homeBtn) {
        homeBtn.onclick = () => {
            loadPage('https://google.com', activeTabId);
        };
    }
    
    const backBtn = document.getElementById('backBtn');
    if (backBtn) {
        backBtn.onclick = () => {
            const tab = tabs.find(t => t.id === activeTabId);
            if (tab && tab.historyIndex > 0) {
                tab.historyIndex--;
                loadPage(tab.history[tab.historyIndex], activeTabId);
            }
        };
    }
    
    const forwardBtn = document.getElementById('forwardBtn');
    if (forwardBtn) {
        forwardBtn.onclick = () => {
            const tab = tabs.find(t => t.id === activeTabId);
            if (tab && tab.historyIndex < tab.history.length - 1) {
                tab.historyIndex++;
                loadPage(tab.history[tab.historyIndex], activeTabId);
            }
        };
    }
    
    const bookmarkBtn = document.getElementById('bookmarkBtn');
    if (bookmarkBtn) {
        bookmarkBtn.onclick = async () => {
            const tab = tabs.find(t => t.id === activeTabId);
            if (!currentUser) {
                alert('Войдите в аккаунт, чтобы добавлять закладки');
                return;
            }
            if (tab) {
                await supabaseClient.from('bookmarks').insert({
                    user_id: currentUser.id,
                    url: tab.url,
                    title: tab.url
                });
                updateStatus('⭐ Добавлено в закладки');
                setTimeout(() => updateStatus('Готов к работе'), 2000);
            }
        };
    }
    
    // ============= ЗАПУСК =============
    createNewTab('https://google.com');
</script>
</body>
</html>
