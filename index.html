<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrToSb — Полноценный браузер на Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        /* Браузерное окружение */
        .browser-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        /* Верхняя панель */
        .browser-toolbar {
            background: #1e1e2e;
            padding: 8px 12px;
            border-bottom: 1px solid #2a2a3e;
        }
        /* Вкладки */
        .tabs-row {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: #2a2a3e;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 12px;
            color: #aaa;
            white-space: nowrap;
        }
        .tab.active {
            background: #3a3a5e;
            color: white;
        }
        .tab-close {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ff6b6b;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
        }
        .new-tab {
            padding: 6px 12px;
            background: #2a2a3e;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 12px;
            color: #aaa;
        }
        /* Навигация */
        .nav-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 8px;
        }
        .nav-btn {
            width: 32px;
            height: 32px;
            background: #2a2a3e;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .url-container {
            flex: 1;
            background: #2a2a3e;
            border-radius: 8px;
            padding: 6px 12px;
        }
        .url-container input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 14px;
        }
        .go-btn {
            background: #ff6b6b;
            padding: 6px 20px;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }
        /* Область просмотра */
        .browser-viewport {
            flex: 1;
            background: white;
            position: relative;
            overflow: auto;
        }
        #page-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* Затемнение при загрузке */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ff6b6b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .hidden {
            display: none !important;
        }
        /* Результаты поиска */
        .search-container {
            padding: 20px;
            background: white;
            height: 100%;
            overflow-y: auto;
        }
        .search-result {
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
        }
        .search-result:hover {
            background: #f5f5f5;
        }
        .status-bar {
            background: #1e1e2e;
            padding: 4px 12px;
            font-size: 11px;
            color: #888;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
<div class="browser-shell">
    <!-- Верхняя панель -->
    <div class="browser-toolbar">
        <div class="tabs-row" id="tabsContainer"></div>
        <div class="nav-controls">
            <div class="nav-btn" id="backBtn">◀</div>
            <div class="nav-btn" id="forwardBtn">▶</div>
            <div class="nav-btn" id="reloadBtn">⟳</div>
            <div class="nav-btn" id="homeBtn">🏠</div>
            <div class="url-container">
                <input type="text" id="urlInput" placeholder="Введите URL или поисковый запрос...">
            </div>
            <div class="go-btn" id="goBtn">Перейти</div>
            <div class="nav-btn" id="bookmarkBtn">⭐</div>
        </div>
    </div>

    <!-- Область просмотра -->
    <div class="browser-viewport" id="viewport">
        <iframe id="page-frame" src="about:blank" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation-by-user-activation"></iframe>
        <div id="searchPanel" class="search-container hidden"></div>
        <div id="loadingOverlay" class="loading-overlay hidden">
            <div class="loader"></div>
        </div>
    </div>

    <!-- Статус бар -->
    <div class="status-bar">
        <span>🔒 BrToSb на Supabase</span>
        <span id="statusText">✅ Готов</span>
    </div>
</div>

<script>
    // ============= НАСТРОЙКИ =============
    const SUPABASE_URL = 'https://runvaexsmgbdeboauaap.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1bnZhZXhzbWdiZGVib2F1YWFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzM1MzcsImV4cCI6MjA5MDYwOTUzN30.y5AL4XkUPzDl1jGDLfvKistXflOpuxcSoedzbhr6hgk';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // ============= СОСТОЯНИЕ =============
    let currentUser = null;
    let tabs = [];
    let activeTabId = null;
    let tabIdCounter = 0;
    
    // DOM элементы
    const iframe = document.getElementById('page-frame');
    const urlInput = document.getElementById('urlInput');
    const searchPanel = document.getElementById('searchPanel');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const statusText = document.getElementById('statusText');
    const tabsContainer = document.getElementById('tabsContainer');
    const viewport = document.getElementById('viewport');
    
    // ============= ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =============
    function setStatus(text, isError = false) {
        statusText.innerHTML = isError ? `❌ ${text}` : `✅ ${text}`;
        console.log(`[Status] ${text}`);
    }
    
    // Загрузка через Edge Function
    async function fetchViaEdge(action, data) {
        try {
            const { data: result, error } = await supabase.functions.invoke('fetch-page', {
                body: JSON.stringify({
                    action: action,
                    ...data,
                    userId: currentUser?.id || 'anonymous'
                })
            });
            if (error) throw error;
            return result;
        } catch (err) {
            console.error('Edge error:', err);
            return { success: false, error: err.message };
        }
    }
    
    // Загрузка страницы
    async function loadPage(url, tabId) {
        const tab = tabs.find(t => t.id === tabId);
        if (!tab) return;
        
        // Нормализация URL
        let finalUrl = url.trim();
        if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://') && !finalUrl.includes('.')) {
            // Это поисковый запрос
            await performSearch(finalUrl, tabId);
            return;
        }
        if (!finalUrl.startsWith('http')) {
            finalUrl = 'https://' + finalUrl;
        }
        
        // Показываем загрузку
        loadingOverlay.classList.remove('hidden');
        searchPanel.classList.add('hidden');
        iframe.classList.remove('hidden');
        setStatus('Загрузка...');
        
        try {
            const result = await fetchViaEdge('navigate', { url: finalUrl });
            
            if (result.success) {
                // Загружаем в iframe
                iframe.srcdoc = result.html;
                
                // Обновляем историю
                if (tab.historyIndex < tab.history.length - 1) {
                    tab.history = tab.history.slice(0, tab.historyIndex + 1);
                }
                tab.history.push(result.url || finalUrl);
                tab.historyIndex = tab.history.length - 1;
                tab.url = result.url || finalUrl;
                
                urlInput.value = result.url || finalUrl;
                setStatus(`Загружено: ${result.title || finalUrl}`);
            } else if (result.searchResults) {
                showSearchResults(result.searchResults, finalUrl, tabId);
                setStatus(`🔍 Результаты поиска`);
            } else {
                throw new Error(result.error || 'Ошибка загрузки');
            }
        } catch (err) {
            iframe.srcdoc = `<html><body style="font-family: Arial; padding: 40px; text-align: center;"><h2>⚠️ Ошибка</h2><p>${err.message}</p><p>Попробуйте другой URL</p></body></html>`;
            setStatus(err.message, true);
        } finally {
            loadingOverlay.classList.add('hidden');
        }
    }
    
    // Поиск
    async function performSearch(query, tabId) {
        loadingOverlay.classList.remove('hidden');
        setStatus('Поиск...');
        
        try {
            const result = await fetchViaEdge('search', { query: query });
            
            if (result.success && result.results) {
                showSearchResults(result.results, query, tabId);
                setStatus(`Найдено ${result.results.length} результатов`);
            } else {
                showSearchResults([], query, tabId);
                setStatus('Ничего не найдено');
            }
        } catch (err) {
            showSearchResults([], query, tabId);
            setStatus('Ошибка поиска', true);
        } finally {
            loadingOverlay.classList.add('hidden');
        }
    }
    
    function showSearchResults(results, query, tabId) {
        iframe.classList.add('hidden');
        searchPanel.classList.remove('hidden');
        
        if (!results || results.length === 0) {
            searchPanel.innerHTML = `
                <div style="text-align: center; padding: 60px;">
                    <div style="font-size: 48px; margin-bottom: 20px;">🔍</div>
                    <h3>Ничего не найдено по запросу "${escapeHtml(query)}"</h3>
                    <p style="color: #666; margin-top: 10px;">Попробуйте другой запрос</p>
                </div>
            `;
            return;
        }
        
        searchPanel.innerHTML = `
            <div style="margin-bottom: 20px; padding: 12px; background: #f0f0f0; border-radius: 8px;">
                <strong>🔍 Результаты поиска: "${escapeHtml(query)}"</strong> (${results.length})
            </div>
            ${results.map(r => `
                <div class="search-result" onclick="window.navigateTo('${escapeHtml(r.url)}')">
                    <div style="font-weight: bold; color: #1a73e8;">${escapeHtml(r.title || r.url)}</div>
                    <div style="font-size: 12px; color: #0d652d; margin-top: 4px;">${escapeHtml(r.url)}</div>
                    <div style="font-size: 13px; color: #555; margin-top: 6px;">${escapeHtml(r.description || '')}</div>
                </div>
            `).join('')}
        `;
        
        // Обновляем URL вкладки
        const tab = tabs.find(t => t.id === tabId);
        if (tab) {
            tab.url = `search:${query}`;
            urlInput.value = query;
            renderTabs();
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    window.navigateTo = function(url) {
        const tab = tabs.find(t => t.id === activeTabId);
        if (tab) {
            loadPage(url, activeTabId);
        }
    };
    
    // ============= УПРАВЛЕНИЕ ВКЛАДКАМИ =============
    function createTab(url = 'https://example.com') {
        const newId = ++tabIdCounter;
        const newTab = {
            id: newId,
            url: url,
            history: [],
            historyIndex: -1
        };
        tabs.push(newTab);
        renderTabs();
        switchToTab(newId);
        loadPage(url, newId);
        return newId;
    }
    
    function switchToTab(tabId) {
        activeTabId = tabId;
        const tab = tabs.find(t => t.id === tabId);
        if (tab) {
            urlInput.value = tab.url.startsWith('search:') ? tab.url.replace('search:', '') : tab.url;
            renderTabs();
            
            if (tab.url.startsWith('search:')) {
                const query = tab.url.replace('search:', '');
                performSearch(query, tabId);
            } else {
                loadPage(tab.url, tabId);
            }
        }
    }
    
    function closeTab(tabId) {
        if (tabs.length <= 1) return;
        const index = tabs.findIndex(t => t.id === tabId);
        if (index !== -1) {
            tabs.splice(index, 1);
            if (activeTabId === tabId) {
                const newActive = tabs[Math.max(0, index - 1)];
                if (newActive) switchToTab(newActive.id);
            }
            renderTabs();
        }
    }
    
    function renderTabs() {
        tabsContainer.innerHTML = '';
        tabs.forEach(tab => {
            const tabDiv = document.createElement('div');
            tabDiv.className = `tab ${activeTabId === tab.id ? 'active' : ''}`;
            let displayName = 'Новая';
            if (tab.url.startsWith('search:')) {
                displayName = `🔍 ${tab.url.replace('search:', '').substring(0, 20)}`;
            } else {
                try {
                    displayName = new URL(tab.url).hostname || 'Новая';
                } catch(e) {
                    displayName = 'Новая';
                }
            }
            tabDiv.innerHTML = `
                <span>${displayName.substring(0, 25)}</span>
                <span class="tab-close" data-id="${tab.id}">✕</span>
            `;
            tabDiv.onclick = (e) => {
                if (e.target.classList.contains('tab-close')) {
                    e.stopPropagation();
                    closeTab(tab.id);
                } else {
                    switchToTab(tab.id);
                }
            };
            tabsContainer.appendChild(tabDiv);
        });
        
        const newBtn = document.createElement('div');
        newBtn.className = 'new-tab';
        newBtn.innerHTML = '+ Новая';
        newBtn.onclick = () => createTab();
        tabsContainer.appendChild(newBtn);
    }
    
    // ============= НАВИГАЦИЯ =============
    document.getElementById('goBtn').onclick = () => {
        const input = urlInput.value.trim();
        if (input) {
            const tab = tabs.find(t => t.id === activeTabId);
            if (tab) loadPage(input, activeTabId);
        }
    };
    
    urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('goBtn').click();
    });
    
    document.getElementById('backBtn').onclick = () => {
        const tab = tabs.find(t => t.id === activeTabId);
        if (tab && tab.historyIndex > 0) {
            tab.historyIndex--;
            loadPage(tab.history[tab.historyIndex], activeTabId);
        }
    };
    
    document.getElementById('forwardBtn').onclick = () => {
        const tab = tabs.find(t => t.id === activeTabId);
        if (tab && tab.historyIndex < tab.history.length - 1) {
            tab.historyIndex++;
            loadPage(tab.history[tab.historyIndex], activeTabId);
        }
    };
    
    document.getElementById('reloadBtn').onclick = () => {
        const tab = tabs.find(t => t.id === activeTabId);
        if (tab && !tab.url.startsWith('search:')) {
            loadPage(tab.url, activeTabId);
        }
    };
    
    document.getElementById('homeBtn').onclick = () => {
        loadPage('https://example.com', activeTabId);
    };
    
    // ============= АВТОРИЗАЦИЯ =============
    const bookmarkBtn = document.getElementById('bookmarkBtn');
    bookmarkBtn.onclick = async () => {
        const tab = tabs.find(t => t.id === activeTabId);
        if (!currentUser) {
            alert('Войдите через GitHub, чтобы добавить закладку');
            return;
        }
        if (tab && !tab.url.startsWith('search:')) {
            await supabase.from('bookmarks').insert({
                user_id: currentUser.id,
                url: tab.url,
                title: tab.url
            });
            setStatus('⭐ Добавлено в закладки');
            setTimeout(() => setStatus('Готов'), 2000);
        }
    };
    
    // Кнопка авторизации в шапке (добавим простую)
    const authSection = document.createElement('div');
    authSection.style.cssText = 'position: fixed; top: 10px; right: 20px; z-index: 10000;';
    authSection.innerHTML = `<button id="simpleAuthBtn" style="background: #ff6b6b; border: none; padding: 6px 12px; border-radius: 8px; color: white; cursor: pointer;">🔑 Войти</button>`;
    document.body.appendChild(authSection);
    
    document.getElementById('simpleAuthBtn').onclick = async () => {
        if (currentUser) {
            await supabase.auth.signOut();
            currentUser = null;
            document.getElementById('simpleAuthBtn').innerHTML = '🔑 Войти';
            setStatus('Вы вышли');
        } else {
            const { error } = await supabase.auth.signInWithOAuth({ provider: 'github' });
            if (error) alert('Ошибка: ' + error.message);
        }
    };
    
    supabase.auth.onAuthStateChange((event, session) => {
        if (session) {
            currentUser = session.user;
            document.getElementById('simpleAuthBtn').innerHTML = `👤 ${session.user.email.split('@')[0]}`;
            setStatus(`Авторизован как ${session.user.email}`);
        }
    });
    
    // ============= ЗАПУСК =============
    createTab('https://example.com');
</script>
</body>
</html>
