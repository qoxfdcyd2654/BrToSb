<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrToSb — Браузер на Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .browser-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .browser-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
        }
        .logo-text {
            font-size: 24px;
            font-weight: bold;
            color: white;
        }
        .badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.8);
        }
        .auth-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .auth-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .browser-frame {
            background: #1e1e2e;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .tabs-bar {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 12px 12px 0 12px;
            overflow-x: auto;
            background: #1e1e2e;
        }
        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #2a2a3e;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            font-size: 13px;
            color: #aaa;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tab.active {
            background: #3a3a5e;
            color: white;
            border-bottom: 2px solid #ff6b6b;
        }
        .tab:hover:not(.active) {
            background: #353550;
            color: #ddd;
        }
        .close-tab {
            width: 16px;
            height: 16px;
            opacity: 0.6;
            cursor: pointer;
        }
        .close-tab:hover {
            opacity: 1;
        }
        .new-tab-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            background: #2a2a3e;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            font-size: 13px;
            color: #aaa;
        }
        .new-tab-btn:hover {
            background: #353550;
            color: #ddd;
        }
        .nav-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: #1e1e2e;
            border-top: 1px solid #2a2a3e;
        }
        .nav-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2a2a3e;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-btn:hover {
            background: #3a3a5e;
            transform: scale(1.05);
        }
        .url-bar {
            flex: 1;
            background: #2a2a3e;
            border-radius: 12px;
            padding: 8px 16px;
            border: 1px solid #3a3a5e;
        }
        .url-bar input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 14px;
        }
        .url-bar input::placeholder {
            color: #666;
        }
        .go-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            padding: 8px 24px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .go-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }
        .content-area {
            background: white;
            min-height: 550px;
            position: relative;
        }
        #browser-viewport {
            width: 100%;
            height: 550px;
            overflow-y: auto;
            background: white;
            padding: 20px;
        }
        /* Стили для отображения HTML */
        #browser-viewport a {
            color: #0066cc;
            text-decoration: none;
        }
        #browser-viewport a:hover {
            text-decoration: underline;
        }
        #browser-viewport img {
            max-width: 100%;
            height: auto;
        }
        #browser-viewport h1 { font-size: 2em; margin: 0.67em 0; }
        #browser-viewport h2 { font-size: 1.5em; margin: 0.83em 0; }
        #browser-viewport h3 { font-size: 1.17em; margin: 1em 0; }
        #browser-viewport p { margin: 1em 0; line-height: 1.5; }
        #browser-viewport ul, #browser-viewport ol { margin: 1em 0; padding-left: 40px; }
        #browser-viewport table { border-collapse: collapse; width: 100%; }
        #browser-viewport th, #browser-viewport td { border: 1px solid #ddd; padding: 8px; }
        .search-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            border: 1px solid #e0e0e0;
            transition: all 0.2s;
        }
        .search-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            border-color: #ff6b6b;
        }
        .loader {
            width: 48px;
            height: 48px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #ff6b6b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .status-bar {
            margin-top: 16px;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1e2e;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff6b6b;
            border-radius: 10px;
        }
        .hidden {
            display: none !important;
        }
        .icon-img {
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body>
<div class="browser-container">
    <!-- ШАПКА -->
    <div class="browser-header">
        <div class="logo-area">
            <img src="https://img.icons8.com/fluency/48/traffic-light.png" class="logo-icon" alt="logo">
            <span class="logo-text">BrToSb</span>
            <span class="badge">Supabase Browser</span>
        </div>
        <button id="authBtn" class="auth-btn">
            <img src="https://img.icons8.com/ios-glyphs/30/ffffff/user--v1.png" style="width: 18px; height: 18px;" alt="user">
            <span>Войти</span>
        </button>
    </div>

    <!-- БРАУЗЕР -->
    <div class="browser-frame">
        <div class="tabs-bar" id="tabsContainer"></div>
        
        <div class="nav-bar">
            <div class="nav-btn" id="backBtn">
                <img src="https://img.icons8.com/ios-glyphs/30/ffffff/chevron-left.png" style="width: 18px; height: 18px;" alt="back">
            </div>
            <div class="nav-btn" id="forwardBtn">
                <img src="https://img.icons8.com/ios-glyphs/30/ffffff/chevron-right.png" style="width: 18px; height: 18px;" alt="forward">
            </div>
            <div class="nav-btn" id="reloadBtn">
                <img src="https://img.icons8.com/ios-glyphs/30/ffffff/refresh.png" style="width: 18px; height: 18px;" alt="reload">
            </div>
            <div class="nav-btn" id="homeBtn">
                <img src="https://img.icons8.com/ios-glyphs/30/ffffff/home.png" style="width: 18px; height: 18px;" alt="home">
            </div>
            <div class="url-bar">
                <input type="text" id="urlInput" placeholder="Введите URL или поисковый запрос...">
            </div>
            <div class="go-btn" id="goBtn">Перейти</div>
            <div class="nav-btn" id="bookmarkBtn">
                <img src="https://img.icons8.com/ios-glyphs/30/ffffff/bookmark-ribbon.png" style="width: 18px; height: 18px;" alt="bookmark">
            </div>
        </div>

        <div class="content-area">
            <div id="browser-viewport"></div>
            <div id="searchResults" class="hidden" style="padding: 20px; background: white; min-height: 550px;"></div>
            <div id="loadingOverlay" class="loading-overlay hidden">
                <div class="loader"></div>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <span>📦 Supabase Storage</span>
        <span id="statusBar">✅ Готов к работе</span>
    </div>
</div>

<script>
    // ============= НАСТРОЙКИ SUPABASE =============
    const SUPABASE_URL = 'https://runvaexsmgbdeboauaap.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1bnZhZXhzbWdiZGVib2F1YWFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzM1MzcsImV4cCI6MjA5MDYwOTUzN30.y5AL4XkUPzDl1jGDLfvKistXflOpuxcSoedzbhr6hgk';
    
    let supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    window._supabaseClient = supabaseClient;
    
    // ============= ГЛОБАЛЬНОЕ СОСТОЯНИЕ =============
    let currentUser = null;
    let tabs = [];
    let activeTabId = null;
    let tabCounter = 0;
    
    // ============= DOM ЭЛЕМЕНТЫ =============
    const viewport = document.getElementById('browser-viewport');
    const urlInput = document.getElementById('urlInput');
    const searchResultsDiv = document.getElementById('searchResults');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const statusSpan = document.getElementById('statusBar');
    const tabsContainer = document.getElementById('tabsContainer');
    
    function updateStatus(text, isError = false) {
        statusSpan.innerHTML = `${isError ? '❌' : '✅'} ${text}`;
    }
    
    // Отрисовка HTML в viewport с сохранением стилей
    function renderHtml(html, baseUrl) {
        viewport.innerHTML = '';
        
        // Создаем временный контейнер
        const temp = document.createElement('div');
        temp.innerHTML = html;
        
        // Исправляем относительные ссылки
        temp.querySelectorAll('a').forEach(link => {
            const href = link.getAttribute('href');
            if (href && !href.startsWith('http://') && !href.startsWith('https://') && !href.startsWith('#')) {
                try {
                    const absoluteUrl = new URL(href, baseUrl).href;
                    link.setAttribute('href', absoluteUrl);
                } catch(e) {}
            }
            link.setAttribute('target', '_self');
            link.onclick = function(e) {
                e.preventDefault();
                const newUrl = this.getAttribute('href');
                if (newUrl && newUrl !== '#') {
                    loadPage(newUrl, activeTabId);
                }
                return false;
            };
        });
        
        // Исправляем относительные пути для изображений
        temp.querySelectorAll('img').forEach(img => {
            const src = img.getAttribute('src');
            if (src && !src.startsWith('http://') && !src.startsWith('https://') && !src.startsWith('data:')) {
                try {
                    const absoluteUrl = new URL(src, baseUrl).href;
                    img.setAttribute('src', absoluteUrl);
                } catch(e) {}
            }
        });
        
        // Исправляем относительные пути для CSS
        temp.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
            const href = link.getAttribute('href');
            if (href && !href.startsWith('http://') && !href.startsWith('https://')) {
                try {
                    const absoluteUrl = new URL(href, baseUrl).href;
                    link.setAttribute('href', absoluteUrl);
                } catch(e) {}
            }
        });
        
        viewport.appendChild(temp);
    }
    
    function showSearchResults(results, query) {
        viewport.classList.add('hidden');
        searchResultsDiv.classList.remove('hidden');
        
        if (!results || results.length === 0) {
            searchResultsDiv.innerHTML = `
                <div style="text-align: center; padding: 60px 20px;">
                    <img src="https://img.icons8.com/clouds/100/000000/search--v1.png" style="width: 80px; margin: 0 auto 20px;">
                    <h3 style="font-size: 20px; color: #333; margin-bottom: 10px;">Ничего не найдено</h3>
                    <p style="color: #666;">Попробуйте другой поисковый запрос</p>
                </div>
            `;
            return;
        }
        
        searchResultsDiv.innerHTML = `
            <div style="margin-bottom: 20px; padding: 12px; background: linear-gradient(135deg, #fff5f5, #fff0f0); border-radius: 12px;">
                <span style="font-weight: bold;">🔍 Результаты поиска: "${escapeHtml(query)}"</span>
                <span style="color: #666; margin-left: 10px;">(найдено ${results.length})</span>
            </div>
            ${results.map(r => `
                <div onclick="window.navigateToUrl('${r.url}')" class="search-card">
                    <div style="display: flex; gap: 12px;">
                        <img src="https://www.google.com/s2/favicons?domain=${r.url}" style="width: 24px; height: 24px;">
                        <div>
                            <div style="font-weight: bold; color: #667eea;">${escapeHtml(r.title || r.url)}</div>
                            <div style="font-size: 13px; color: #888; margin-top: 4px;">${escapeHtml(r.url)}</div>
                            <div style="font-size: 14px; color: #555; margin-top: 6px;">${escapeHtml(r.description || 'Нет описания')}</div>
                        </div>
                    </div>
                </div>
            `).join('')}
        `;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ============= ОСНОВНЫЕ ФУНКЦИИ =============
    async function callEdgeFunction(action, data) {
        try {
            const { data: result, error } = await supabaseClient.functions.invoke('fetch-page', {
                body: JSON.stringify({
                    action: action,
                    ...data,
                    userId: currentUser?.id || 'anonymous'
                })
            });
            if (error) throw error;
            return result;
        } catch (err) {
            console.error('Edge Function error:', err);
            updateStatus(err.message, true);
            return { success: false, error: err.message };
        }
    }
    
    async function loadPage(url, tabId) {
        const tab = tabs.find(t => t.id === tabId);
        if (!tab) return;
        
        let finalUrl = url;
        if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
            finalUrl = 'https://' + finalUrl;
        }
        
        loadingOverlay.classList.remove('hidden');
        searchResultsDiv.classList.add('hidden');
        viewport.classList.remove('hidden');
        updateStatus('Загрузка...');
        
        try {
            const result = await callEdgeFunction('navigate', { url: finalUrl });
            
            if (result.success) {
                renderHtml(result.html, result.url || finalUrl);
                
                if (tab.historyIndex < tab.history.length - 1) {
                    tab.history = tab.history.slice(0, tab.historyIndex + 1);
                }
                tab.history.push(result.url || finalUrl);
                tab.historyIndex = tab.history.length - 1;
                tab.url = result.url || finalUrl;
                
                urlInput.value = result.url || finalUrl;
                updateStatus(`Загружено: ${result.title || finalUrl}`);
            } else if (result.searchResults) {
                showSearchResults(result.searchResults, finalUrl);
                updateStatus(`Сайт не найден, показаны результаты поиска`);
            } else {
                throw new Error(result.error || 'Неизвестная ошибка');
            }
        } catch (err) {
            viewport.innerHTML = `<div style="padding: 40px; text-align: center; color: #666;"><h2>⚠️ Ошибка</h2><p>${err.message}</p></div>`;
            updateStatus(`Ошибка: ${err.message}`, true);
        } finally {
            loadingOverlay.classList.add('hidden');
        }
    }
    
    window.navigateToUrl = function(url) {
        searchResultsDiv.classList.add('hidden');
        viewport.classList.remove('hidden');
        const tab = tabs.find(t => t.id === activeTabId);
        if (tab) loadPage(url, activeTabId);
    };
    
    // ============= УПРАВЛЕНИЕ ВКЛАДКАМИ =============
    function createNewTab(url = 'https://example.com') {
        const newId = ++tabCounter;
        const newTab = {
            id: newId,
            url: url,
            history: [],
            historyIndex: -1
        };
        tabs.push(newTab);
        renderTabs();
        switchToTab(newId);
        loadPage(url, newId);
        return newId;
    }
    
    function switchToTab(tabId) {
        activeTabId = tabId;
        const tab = tabs.find(t => t.id === tabId);
        if (tab) {
            urlInput.value = tab.url;
            renderTabs();
            loadPage(tab.url, tabId);
        }
    }
    
    function closeTab(tabId) {
        if (tabs.length === 1) return;
        const index = tabs.findIndex(t => t.id === tabId);
        if (index !== -1) {
            tabs.splice(index, 1);
            if (activeTabId === tabId) {
                const newActive = tabs[Math.min(index, tabs.length - 1)];
                if (newActive) switchToTab(newActive.id);
            }
            renderTabs();
        }
    }
    
    function renderTabs() {
        tabsContainer.innerHTML = '';
        tabs.forEach(tab => {
            const tabDiv = document.createElement('div');
            tabDiv.className = `tab ${activeTabId === tab.id ? 'active' : ''}`;
            let hostname = 'Новая';
            try {
                hostname = new URL(tab.url).hostname;
            } catch(e) {}
            tabDiv.innerHTML = `
                <img src="https://img.icons8.com/ios-glyphs/30/${activeTabId === tab.id ? 'ffffff' : 'aaaaaa'}/globe--v1.png" style="width: 14px; height: 14px;">
                <span>${hostname.substring(0, 20)}</span>
                <img src="https://img.icons8.com/ios-glyphs/30/ffffff/delete-sign--v1.png" class="close-tab" style="width: 12px; height: 12px;">
            `;
            tabDiv.onclick = (e) => {
                if (e.target.classList.contains('close-tab')) {
                    e.stopPropagation();
                    closeTab(tab.id);
                } else {
                    switchToTab(tab.id);
                }
            };
            tabsContainer.appendChild(tabDiv);
        });
        
        const newTabBtn = document.createElement('div');
        newTabBtn.className = 'new-tab-btn';
        newTabBtn.innerHTML = `➕ Новая`;
        newTabBtn.onclick = () => createNewTab();
        tabsContainer.appendChild(newTabBtn);
    }
    
    // ============= АВТОРИЗАЦИЯ =============
    const authBtn = document.getElementById('authBtn');
    authBtn.onclick = async () => {
        if (currentUser) {
            await supabaseClient.auth.signOut();
            currentUser = null;
            authBtn.innerHTML = `<img src="https://img.icons8.com/ios-glyphs/30/ffffff/user--v1.png" style="width: 18px;"><span>Войти</span>`;
            updateStatus('Вы вышли из аккаунта');
        } else {
            const { error } = await supabaseClient.auth.signInWithOAuth({ provider: 'github' });
            if (error) alert('Ошибка: ' + error.message);
        }
    };
    
    supabaseClient.auth.onAuthStateChange((event, session) => {
        if (session) {
            currentUser = session.user;
            const userName = session.user.email.split('@')[0];
            authBtn.innerHTML = `<img src="https://img.icons8.com/ios-glyphs/30/ffffff/user--v1.png" style="width: 18px;"><span>${userName}</span>`;
            updateStatus(`Авторизован как ${session.user.email}`);
        }
    });
    
    // ============= НАВИГАЦИЯ =============
    document.getElementById('goBtn').onclick = () => {
        let input = urlInput.value.trim();
        if (input) loadPage(input, activeTabId);
    };
    
    urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('goBtn').click();
    });
    
    document.getElementById('reloadBtn').onclick = () => {
        const tab = tabs.find(t => t.id === activeTabId);
        if (tab) loadPage(tab.url, activeTabId);
    };
    
    document.getElementById('homeBtn').onclick = () => {
        loadPage('https://example.com', activeTabId);
    };
    
    document.getElementById('backBtn').onclick = () => {
        const tab = tabs.find(t => t.id === activeTabId);
        if (tab && tab.historyIndex > 0) {
            tab.historyIndex--;
            loadPage(tab.history[tab.historyIndex], activeTabId);
        }
    };
    
    document.getElementById('forwardBtn').onclick = () => {
        const tab = tabs.find(t => t.id === activeTabId);
        if (tab && tab.historyIndex < tab.history.length - 1) {
            tab.historyIndex++;
            loadPage(tab.history[tab.historyIndex], activeTabId);
        }
    };
    
    document.getElementById('bookmarkBtn').onclick = async () => {
        const tab = tabs.find(t => t.id === activeTabId);
        if (!currentUser) {
            alert('Войдите в аккаунт');
            return;
        }
        if (tab) {
            await supabaseClient.from('bookmarks').insert({
                user_id: currentUser.id,
                url: tab.url,
                title: tab.url
            });
            updateStatus('⭐ Добавлено в закладки');
            setTimeout(() => updateStatus('Готов к работе'), 2000);
        }
    };
    
    // ============= ЗАПУСК =============
    createNewTab('https://example.com');
</script>
</body>
</html>
